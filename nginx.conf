# ============================================================
# Parkar.in – Production Nginx Configuration
# Deploy: copy to /etc/nginx/sites-available/parkar.in
#         then: ln -s /etc/nginx/sites-available/parkar.in /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name parkar.in www.parkar.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parkar.in www.parkar.in;

    # ── SSL (replace with your cert paths) ──────────────────
    ssl_certificate     /etc/ssl/certs/parkar.in.crt;
    ssl_certificate_key /etc/ssl/private/parkar.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Document root ────────────────────────────────────────
    root /var/www/parkar.in;
    index index.html;
    charset utf-8;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()";

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── www → non-www redirect ───────────────────────────────
    if ($host = www.parkar.in) {
        return 301 https://parkar.in$request_uri;
    }

    # ════════════════════════════════════════════════════════
    # CLEAN URL REWRITE RULES
    # Maps /clean-url → /pages/Folder/File.html
    # ════════════════════════════════════════════════════════

    # Home
    location = / {
        try_files /index.html =404;
    }

    # ── Platforms ────────────────────────────────────────────
    location = /platforms/aioniq              { try_files /pages/Platforms/AIONIQ.html =404; }
    location = /platforms/vector              { try_files /pages/Vector/Overview.html =404; }
    location = /platforms/vector-platform     { try_files /pages/Vector/Platform.html =404; }
    location = /platforms/vector-integrations { try_files /pages/Vector/Integration.html =404; }

    # ── Solutions ────────────────────────────────────────────
    location = /solutions/agentic-ai    { try_files /pages/Solutions/AgenticAI.html =404; }
    location = /solutions/applications  { try_files /pages/Solutions/Applications.html =404; }
    location = /solutions/data          { try_files /pages/Solutions/Data.html =404; }
    location = /solutions/cloud         { try_files /pages/Solutions/Cloud.html =404; }

    # Solutions case studies
    location ~ ^/solutions/case-studies/(.+)$ {
        try_files /pages/Solutions/case-studies/$1.html =404;
    }

    # ── GCC ──────────────────────────────────────────────────
    location = /gcc/overview              { try_files /pages/GCC/Overview.html =404; }
    location = /gcc/managed-service       { try_files /pages/GCC/ManagedService.html =404; }
    location = /gcc/pay-as-you-go         { try_files /pages/GCC/PayAsYouGo.html =404; }
    location = /gcc/build-operate-transfer{ try_files /pages/GCC/BuildOperateTransfer.html =404; }
    location = /gcc/thought-leadership    { try_files /pages/GCC/ThoughtLeadership.html =404; }

    # GCC articles
    location ~ ^/gcc/blogs/(.+)$ {
        try_files /pages/GCC/GccBlogs/$1.html =404;
    }
    location ~ ^/gcc/case-studies/(.+)$ {
        try_files /pages/GCC/GccCaseStudies/$1.html =404;
    }

    # ── Industries ───────────────────────────────────────────
    location = /industries/financial-services { try_files /pages/Industries/FinancialServices.html =404; }
    location = /industries/healthcare         { try_files /pages/Industries/Healthcare.html =404; }
    location = /industries/manufacturing      { try_files /pages/Industries/Manufacturing.html =404; }
    location = /industries/media              { try_files /pages/Industries/Media.html =404; }

    # ── Resources ────────────────────────────────────────────
    location = /resources/insights      { try_files /pages/Resources/Insights.html =404; }
    location = /resources/research      { try_files /pages/Resources/ResourcesHub.html =404; }
    location = /resources/case-studies  { try_files /pages/Resources/CaseStudy.html =404; }
    location = /resources/events        { try_files /pages/Resources/Events.html =404; }
    location = /resources/news          { try_files /pages/Resources/News.html =404; }

    # Resource articles (blogs, case-studies, events, news, webinars)
    location ~ ^/resources/(blogs|case-studies|events|news|webinars)/(.+)$ {
        try_files /pages/Resources/$1/$2.html =404;
    }

    # ── Company ──────────────────────────────────────────────
    location = /company/about        { try_files /pages/Company/About.html =404; }
    location = /company/our-journey  { try_files /pages/Company/OurJourney.html =404; }
    location = /company/awards       { try_files /pages/Company/AwardsRecognitions.html =404; }
    location = /company/partners     { try_files /pages/Company/Partners.html =404; }
    location = /company/leadership   { try_files /pages/Company/Leadership.html =404; }

    # ── Careers ──────────────────────────────────────────────
    location = /careers/life-at-parkar   { try_files /pages/Careers/LifeAtParkar.html =404; }
    location = /careers/open-positions   { try_files /pages/Careers/OpenPositions.html =404; }
    location = /careers/team-highlights  { try_files /pages/Careers/TeamHighlights.html =404; }

    location ~ ^/careers/team-highlights/(.+)$ {
        try_files /pages/Careers/TeamHighlights/$1.html =404;
    }

    # ── Contact ──────────────────────────────────────────────
    location = /contact { try_files /pages/Contact.html =404; }

    # ── Serve static files directly (css, js, assets, components) ───────────
    location / {
        try_files $uri $uri/ =404;
    }
}
